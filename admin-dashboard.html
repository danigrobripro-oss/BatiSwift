<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin — BatiSwift</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      text-align: center;
      backdrop-filter: blur(8px);
    }
    .stat-number {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--accent);
      text-shadow: 0 0 30px var(--accent-glow);
    }
    .stat-label { color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg-elevated);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .admin-table th, .admin-table td {
      padding: 0.75rem 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .admin-table th { background: var(--bg-muted); font-weight: 600; color: var(--text); }
    .admin-table tr:hover { background: rgba(255, 45, 122, 0.05); }
    .badge {
      display: inline-block;
      padding: 0.25rem 0.5rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-success { background: rgba(46, 204, 113, 0.2); color: #2ecc71; }
    .badge-warning { background: rgba(255, 45, 122, 0.2); color: var(--accent); }
    .refresh-btn { margin-left: 1rem; padding: 0.25rem 0.75rem; font-size: 0.8rem; }
  </style>
  <script>
    (function () {
      var t = localStorage.getItem("batiswift-theme");
      if (t === "dark" || (!t && matchMedia("(prefers-color-scheme: dark)").matches)) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    })();
  </script>
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="container" style="padding: 2rem 0;">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;margin-bottom:1.5rem;">
      <h1>📊 Administration BatiSwift</h1>
      <button class="btn btn--primary refresh-btn" onclick="refreshAll()">⟳ Actualiser</button>
    </div>

    <div class="stats-grid" id="stats-grid">
      <div class="stat-card"><span class="stat-number" id="stat-artisans">0</span><div class="stat-label">Artisans</div></div>
      <div class="stat-card"><span class="stat-number" id="stat-leads-available">0</span><div class="stat-label">Leads disponibles</div></div>
      <div class="stat-card"><span class="stat-number" id="stat-leads-sold">0</span><div class="stat-label">Leads vendus</div></div>
      <div class="stat-card"><span class="stat-number" id="stat-revenue">0 €</span><div class="stat-label">CA (Stripe)</div></div>
      <div class="stat-card"><span class="stat-number" id="stat-subscriptions">0</span><div class="stat-label">Abonnements actifs</div></div>
    </div>

    <div style="margin-bottom:2rem;">
      <button id="trigger-relance-btn" class="btn btn--primary" onclick="triggerRelance()">⟳ Forcer une relance</button>
    </div>

    <h2>👨‍🔧 Artisans inscrits</h2>
    <div style="overflow-x:auto;margin-bottom:2rem;">
      <table class="admin-table">
        <thead><tr><th>ID</th><th>Nom</th><th>Email</th><th>Abonnement</th><th>Inscrit le</th></tr></thead>
        <tbody id="artisans-table-body"><tr><td colspan="5">Chargement...</td></tr>
      </table>
    </div>

    <h2>📋 Derniers leads</h2>
    <div style="overflow-x:auto;">
      <table class="admin-table">
        <thead><tr><th>ID</th><th>Type</th><th>Client</th><th>Statut</th><th>Date</th></tr></thead>
        <tbody id="leads-table-body"><tr><td colspan="5">Chargement...</td></tr>
      </table>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script>
    const API_BASE = "https://agent-btp.onrender.com";
    let adminToken = localStorage.getItem("batiswift-admin-token") || "";

    async function api(path, options = {}) {
      const headers = { "Content-Type": "application/json" };
      if (adminToken) headers["X-Admin-Token"] = adminToken;
      const res = await fetch(API_BASE + path, { ...options, headers });
      if (!res.ok) throw new Error(await res.text() || "Erreur");
      return res.json();
    }

    async function loadStats() {
      try {
        const stats = await api("/admin/stats");
        document.getElementById("stat-artisans").textContent = stats.artisans || 0;
        document.getElementById("stat-leads-available").textContent = stats.leads_available || 0;
        document.getElementById("stat-leads-sold").textContent = stats.leads_sold || 0;
        document.getElementById("stat-revenue").textContent = (stats.revenue || 0).toFixed(2) + " €";
        document.getElementById("stat-subscriptions").textContent = stats.active_subscriptions || 0;
      } catch(e) { console.error("Stats error", e); }
    }

    async function loadArtisans() {
      try {
        const artisans = await api("/admin/artisans");
        const tbody = document.getElementById("artisans-table-body");
        tbody.innerHTML = "";
        artisans.forEach(a => {
          const row = tbody.insertRow();
          row.insertCell(0).textContent = a.id;
          row.insertCell(1).textContent = a.name;
          row.insertCell(2).textContent = a.email || "—";
          row.insertCell(3).innerHTML = a.subscription_active ? '<span class="badge badge-success">Actif</span>' : '<span class="badge badge-warning">Inactif</span>';
          row.insertCell(4).textContent = a.created_at ? new Date(a.created_at).toLocaleDateString() : "—";
        });
      } catch(e) { console.error("Artisans error", e); }
    }

    async function loadLeads() {
      try {
        const leads = await api("/admin/leads");
        const tbody = document.getElementById("leads-table-body");
        tbody.innerHTML = "";
        leads.forEach(l => {
          const row = tbody.insertRow();
          row.insertCell(0).textContent = l.id;
          row.insertCell(1).textContent = l.trade_type || "—";
          row.insertCell(2).textContent = l.client_name || l.client_phone || "—";
          row.insertCell(3).innerHTML = l.status === 'available' ? '<span class="badge badge-success">Disponible</span>' : '<span class="badge badge-warning">Vendu</span>';
          row.insertCell(4).textContent = new Date(l.created_at).toLocaleDateString();
        });
      } catch(e) { console.error("Leads error", e); }
    }

    async function triggerRelance() {
      const btn = document.getElementById("trigger-relance-btn");
      btn.disabled = true; btn.textContent = "Envoi en cours...";
      try {
        await api("/admin/trigger_relance", { method: "POST" });
        alert("Relance déclenchée ! Vérifie les logs.");
      } catch(e) { alert("Erreur : " + e.message); }
      finally { btn.disabled = false; btn.textContent = "Forcer une relance"; }
    }

    function refreshAll() { loadStats(); loadArtisans(); loadLeads(); }

    function checkAuth() {
      if (!adminToken) {
        const token = prompt("🔐 Accès administrateur – Veuillez entrer le token secret :");
        if (token) {
          adminToken = token;
          localStorage.setItem("batiswift-admin-token", token);
          refreshAll();
        } else {
          document.body.innerHTML = "<div style='text-align:center;margin-top:4rem'><h2>Accès interdit</h2><p>Token administrateur requis.</p></div>";
        }
      } else {
        refreshAll();
      }
    }

    // Charger header/footer
    fetch('header.html').then(r => r.text()).then(html => {
      document.getElementById('header-placeholder').innerHTML = html;
    });
    fetch('footer.html').then(r => r.text()).then(html => {
      document.getElementById('footer-placeholder').innerHTML = html;
    });

    window.onload = checkAuth;
  </script>
</body>
</html>
