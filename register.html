<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Inscription artisan BatiSwift — Recevez des clients qualifiés">
  <meta name="theme-color" content="#ff2d7a">
  <title>Inscription artisan – BatiSwift</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .register-card {
      max-width: 560px;
      margin: 2rem auto;
      background: var(--bg-elevated);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      padding: 2rem;
      backdrop-filter: blur(12px);
      transition: 0.25s;
    }
    .register-card h1 { font-size: 1.8rem; margin-bottom: 0.5rem; color: var(--text); }
    .register-card .sub { color: var(--text-muted); margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1.25rem; }
    label { display: block; font-weight: 600; margin-bottom: 0.4rem; font-size: 0.9rem; color: var(--text); }
    input, select {
      width: 100%;
      padding: 0.8rem 1rem;
      border: 1px solid var(--border);
      border-radius: 14px;
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      transition: 0.2s;
    }
    input:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }
    .btn--block { width: 100%; margin-top: 0.5rem; }
    .error { color: #ff2d7a; font-size: 0.85rem; margin-top: 0.5rem; text-align: center; }
    .success { color: #2ecc71; text-align: center; }
    .hidden { display: none; }
    .dashboard-link {
      word-break: break-all;
      background: var(--bg-muted);
      padding: 0.5rem;
      border-radius: 12px;
      margin: 1rem 0;
      font-size: 0.8rem;
      color: var(--text);
    }
    .back-link { display: inline-block; margin-top: 1.5rem; color: var(--accent); text-decoration: none; }
  </style>
  <script>
    (function () {
      var t = localStorage.getItem("batiswift-theme");
      if (t === "dark" || (!t && matchMedia("(prefers-color-scheme: dark)").matches)) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
      var translucide = localStorage.getItem("batiswift-translucide");
      if (translucide === "true") {
        document.body.classList.add("translucide");
      }
    })();
  </script>
</head>
<body>
  <div class="container">
    <div class="register-card">
      <h1>👷 Inscription artisan</h1>
      <p class="sub">Rejoignez BatiSwift et recevez des clients qualifiés dans votre secteur.</p>

      <div id="form-container">
        <div class="form-group">
          <label>Nom / raison sociale *</label>
          <input type="text" id="art-name" placeholder="Ex: SARAS Plomberie" autocomplete="name">
        </div>
        <div class="form-group">
          <label>Email professionnel *</label>
          <input type="email" id="art-email" placeholder="contact@artisan.fr" autocomplete="email">
        </div>
        <div class="form-group">
          <label>Téléphone</label>
          <input type="tel" id="art-phone" placeholder="0612345678" autocomplete="tel">
        </div>
        <div class="form-group">
          <label>Métier principal</label>
          <select id="art-trade">
            <option value="">Sélectionner</option>
            <option>Plomberie</option><option>Électricité</option><option>Peinture</option>
            <option>Maçonnerie</option><option>Chauffage</option><option>Serrurerie</option><option>Autre</option>
          </select>
        </div>
        <div class="form-group">
          <label>Zone d'intervention (ville/CP)</label>
          <input type="text" id="art-zone" placeholder="Ex: Paris, 75001">
        </div>
        <button class="btn btn--primary btn--block" id="register-btn">S'inscrire</button>
        <div id="form-error" class="error"></div>
      </div>

      <div id="success-container" class="hidden">
        <div class="success">✅ Inscription réussie !</div>
        <p style="margin-top:1rem;">Voici votre lien d'accès au tableau de bord :</p>
        <div class="dashboard-link" id="dashboard-url"></div>
        <button class="btn btn--primary btn--block" id="copy-btn">Copier le lien</button>
        <a href="#" id="dashboard-link" class="back-link" target="_blank">Ouvrir mon espace</a>
      </div>

      <div style="text-align: center; margin-top: 1.5rem;">
        <a href="index.html" class="back-link">← Retour au site</a>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "https://agent-btp.onrender.com";
    const registerBtn = document.getElementById('register-btn');
    const formError = document.getElementById('form-error');
    const formContainer = document.getElementById('form-container');
    const successContainer = document.getElementById('success-container');
    const dashboardUrlSpan = document.getElementById('dashboard-url');
    const dashboardLink = document.getElementById('dashboard-link');
    const copyBtn = document.getElementById('copy-btn');

    registerBtn.addEventListener('click', async () => {
      const name = document.getElementById('art-name').value.trim();
      const email = document.getElementById('art-email').value.trim();
      const phone = document.getElementById('art-phone').value.trim();
      const trade = document.getElementById('art-trade').value;
      const zone = document.getElementById('art-zone').value.trim();

      if (!name || !email) {
        formError.textContent = 'Le nom et l’email sont obligatoires.';
        return;
      }
      formError.textContent = '';
      registerBtn.disabled = true;
      registerBtn.textContent = 'Inscription en cours...';

      try {
        const res = await fetch(`${API_BASE}/api/artisan/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, phone, trade, zone })
        });
        const data = await res.json();
        if (res.status === 409 || data.error) {
          formError.textContent = data.error || 'Erreur lors de l’inscription.';
          if (data.dashboard_url) {
            dashboardUrlSpan.textContent = data.dashboard_url;
            dashboardLink.href = data.dashboard_url;
            formContainer.classList.add('hidden');
            successContainer.classList.remove('hidden');
          }
          return;
        }
        if (data.success) {
          dashboardUrlSpan.textContent = data.dashboard_url;
          dashboardLink.href = data.dashboard_url;
          localStorage.setItem('artisan_token', data.token);
          formContainer.classList.add('hidden');
          successContainer.classList.remove('hidden');
        } else {
          formError.textContent = 'Erreur inconnue.';
        }
      } catch (err) {
        formError.textContent = 'Impossible de contacter le serveur.';
      } finally {
        registerBtn.disabled = false;
        registerBtn.textContent = "S'inscrire";
      }
    });

    copyBtn.addEventListener('click', () => {
      const text = dashboardUrlSpan.textContent;
      navigator.clipboard.writeText(text);
      copyBtn.textContent = 'Copié !';
      setTimeout(() => copyBtn.textContent = 'Copier le lien', 2000);
    });
  </script>
</body>
</html>
