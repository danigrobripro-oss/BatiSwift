<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Espace pro — BatiFlash</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/artisan.css">
  <script>
    (function () {
      var t = localStorage.getItem("batiflash-theme");
      if (t === "dark" || (!t && matchMedia("(prefers-color-scheme: dark)").matches)) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    })();
  </script>
</head>
<body class="artisan-page">
  <div class="container">
    <header class="artisan-header">
      <div class="artisan-header__inner">
        <a href="index.html" class="logo">
          <span class="logo__icon" aria-hidden="true">BF</span>
          BatiFlash Pro
        </a>
        <div class="header__actions">
          <button type="button" class="icon-btn theme-toggle" id="theme-toggle" aria-label="Thème">
            <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/></svg>
            <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
          <button type="button" class="btn btn--ghost btn--sm" id="logout-btn" hidden>Déconnexion</button>
        </div>
      </div>
    </header>

    <section id="auth-view">
      <div class="auth-card">
        <h1>Espace artisan</h1>
        <p>Connectez-vous pour voir et acheter des leads clients qualifiés.</p>

        <a href="https://t.me/mon_agent_btp_bot?start=artisan" class="btn btn--primary btn--block" id="telegram-register" target="_blank" rel="noopener">
          S'inscrire via Telegram
        </a>

        <div class="auth-divider">ou</motion-placeholder>

        <form id="email-login-form">
          <div class="form-group">
            <label for="login-email">Email professionnel</label>
            <input type="email" id="login-email" required placeholder="artisan@exemple.fr" autocomplete="email">
          </div>
          <button type="submit" class="btn btn--primary btn--block">Se connecter</button>
          <p class="form-error" id="login-error"></p>
        </form>

        <p style="margin-top:1.25rem;font-size:0.82rem;color:var(--text-muted)">
          Pas encore inscrit ? Utilisez Telegram : <code>/start artisan</code>
        </p>
      </div>
    </section>

    <section id="dashboard-view" hidden>
      <p class="artisan-header__user">Bonjour, <strong id="artisan-name">Artisan</strong></p>
      <div id="alert-box" class="alert" hidden></div>

      <nav class="tabs" role="tablist">
        <button type="button" class="tab is-active" data-panel="panel-available" role="tab">Leads disponibles</button>
        <button type="button" class="tab" data-panel="panel-purchased" role="tab">Mes achats</button>
      </nav>

      <div id="panel-available" class="tab-panel is-active" role="tabpanel">
        <p style="color:var(--text-muted);font-size:0.9rem;margin-bottom:1rem">
          Les coordonnées complètes sont débloquées après paiement par carte (10–20 € selon le chantier).
        </p>
        <div id="leads-available"></div>
      </div>

      <div id="panel-purchased" class="tab-panel" role="tabpanel">
        <div id="leads-purchased"></div>
      </div>
    </section>
  </div>

  <script src="js/config.js"></script>
  <script src="js/artisan.js"></script>
  <script>
    document.getElementById("logout-btn").hidden = false;
  </script>
</body>
</html>
