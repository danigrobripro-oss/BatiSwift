<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="BatiSwift — Assistant IA pour artisans du BTP. Trouvez des leads qualifiés 24h/24.">
  <meta name="theme-color" content="#ff2d7a">
  <title>BatiSwift — Artisan BTP, leads et IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script>
    (function () {
      var t = localStorage.getItem("batiswift-theme");
      if (t === "dark" || (!t && matchMedia("(prefers-color-scheme: dark)").matches)) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
      var translucide = localStorage.getItem("batiswift-translucide");
      if (translucide === "true") {
        document.body.classList.add("translucide");
      }
    })();
  </script>
</head>
<body>
  <!-- Inclusion du header -->
  <div id="header-placeholder"></div>

  <main>
    <section class="hero">
      <div class="container">
        <p class="hero__badge">⚡ IA pour artisans · Réponse en 2 min</p>
        <h1 class="hero__title">Trouvez des leads <span>qualifiés 24h/24</span> sans rien faire</h1>
        <p class="hero__subtitle">
          Plus d’appels manqués, plus de devis perdus. BatiSwift qualifie vos clients et vous les envoie directement sur WhatsApp.
        </p>
        <div class="hero__cta">
          <a href="inscription.html" class="btn btn--primary btn--lg">🔥 Je m’inscris gratuitement</a>
          <a href="tarifs.html" class="btn btn--ghost btn--lg">Voir les tarifs</a>
        </div>
        <div class="counters" id="counters">
          <div class="counter-item">
            <span class="number" id="counter-artisans">0</span>
            <span class="label">Artisans actifs</span>
          </div>
          <div class="counter-item">
            <span class="number" id="counter-leads">0</span>
            <span class="label">Demandes traitées</span>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Inclusion du footer -->
  <div id="footer-placeholder"></div>

  <script>
    // Chargement du header et footer
    fetch('header.html').then(r => r.text()).then(html => {
      document.getElementById('header-placeholder').innerHTML = html;
      // Réappliquer les événements après chargement
    });
    fetch('footer.html').then(r => r.text()).then(html => {
      document.getElementById('footer-placeholder').innerHTML = html;
    });

    // Compteurs
    async function loadCounters() {
      try {
        const res = await fetch("https://agent-btp.onrender.com/api/stats/public");
        const data = await res.json();
        document.getElementById("counter-artisans").textContent = data.artisans || 0;
        document.getElementById("counter-leads").textContent = data.leads_total || 0;
      } catch(e) { console.error("Erreur compteurs", e); }
    }
    loadCounters();
  </script>
</body>
</html>
