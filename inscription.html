<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Inscription artisan BatiSwift — Recevez des clients qualifiés">
  <title>Inscription artisan — BatiSwift</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .register-card {
      max-width: 560px;
      margin: 2rem auto;
      background: var(--bg-elevated);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      padding: 2rem;
      backdrop-filter: blur(12px);
    }
    .register-card h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
    .register-card .sub { color: var(--text-muted); margin-bottom: 1.5rem; }
  </style>
  <script>
    (function () {
      var t = localStorage.getItem("batiswift-theme");
      if (t === "dark" || (!t && matchMedia("(prefers-color-scheme: dark)").matches)) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
      var translucide = localStorage.getItem("batiswift-translucide");
      if (translucide === "true") {
        document.body.classList.add("translucide");
      }
    })();
  </script>
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="container">
    <div class="register-card">
      <h1>👷 Inscription artisan</h1>
      <p class="sub">Rejoignez BatiSwift et recevez des clients qualifiés dans votre secteur.</p>

      <div id="form-container">
        <div class="form-group">
          <label>Nom / raison sociale *</label>
          <input type="text" id="art-name" placeholder="Ex: SARAS Plomberie">
        </div>
        <div class="form-group">
          <label>Email professionnel *</label>
          <input type="email" id="art-email" placeholder="contact@artisan.fr">
        </div>
        <div class="form-group">
          <label>Téléphone</label>
          <input type="tel" id="art-phone" placeholder="0612345678">
        </div>
        <div class="form-group">
          <label>Métier principal</label>
          <select id="art-trade">
            <option value="">Sélectionner</option>
            <option>Plomberie</option><option>Électricité</option><option>Peinture</option>
            <option>Maçonnerie</option><option>Chauffage</option><option>Serrurerie</option><option>Autre</option>
          </select>
        </div>
        <div class="form-group">
          <label>Zone d'intervention (ville/CP)</label>
          <input type="text" id="art-zone" placeholder="Ex: Paris, 75001">
        </div>
        <button class="btn btn--primary btn--block" id="register-btn">S'inscrire</button>
        <div id="form-error" class="error" style="color:var(--accent);margin-top:0.5rem;"></div>
      </div>

      <div id="success-container" style="display:none; text-align:center; padding:1rem 0;">
        <div style="color:#2ecc71;font-size:1.2rem;">✅ Inscription réussie !</div>
        <p style="margin-top:1rem;">Voici votre lien d'accès au tableau de bord :</p>
        <div id="dashboard-url" style="word-break:break-all;background:var(--bg-muted);padding:0.5rem;border-radius:12px;margin:1rem 0;"></div>
        <a href="#" id="dashboard-link" class="btn btn--primary" target="_blank">Ouvrir mon espace</a>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script>
    const API_BASE = "https://agent-btp.onrender.com";
    const registerBtn = document.getElementById('register-btn');
    const formError = document.getElementById('form-error');

    registerBtn.addEventListener('click', async () => {
      const name = document.getElementById('art-name').value.trim();
      const email = document.getElementById('art-email').value.trim();
      const phone = document.getElementById('art-phone').value.trim();
      const trade = document.getElementById('art-trade').value;
      const zone = document.getElementById('art-zone').value.trim();

      if (!name || !email) {
        formError.textContent = 'Le nom et l’email sont obligatoires.';
        return;
      }
      formError.textContent = '';
      registerBtn.disabled = true;
      registerBtn.textContent = 'Inscription en cours...';

      try {
        const res = await fetch(`${API_BASE}/api/artisan/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, phone, trade, zone })
        });
        const data = await res.json();
        if (res.status === 409 || data.error) {
          formError.textContent = data.error || 'Erreur lors de l’inscription.';
          if (data.dashboard_url) {
            document.getElementById('dashboard-url').textContent = data.dashboard_url;
            document.getElementById('dashboard-link').href = data.dashboard_url;
            document.getElementById('form-container').style.display = 'none';
            document.getElementById('success-container').style.display = 'block';
          }
          return;
        }
        if (data.success) {
          document.getElementById('dashboard-url').textContent = data.dashboard_url;
          document.getElementById('dashboard-link').href = data.dashboard_url;
          document.getElementById('form-container').style.display = 'none';
          document.getElementById('success-container').style.display = 'block';
        } else {
          formError.textContent = 'Erreur inconnue.';
        }
      } catch (err) {
        formError.textContent = 'Impossible de contacter le serveur.';
      } finally {
        registerBtn.disabled = false;
        registerBtn.textContent = "S'inscrire";
      }
    });

    fetch('header.html').then(r => r.text()).then(html => {
      document.getElementById('header-placeholder').innerHTML = html;
    });
    fetch('footer.html').then(r => r.text()).then(html => {
      document.getElementById('footer-placeholder').innerHTML = html;
    });
  </script>
</body>
</html>
